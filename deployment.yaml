apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-k8s-application
  labels:
    app: simple-k8s-application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-k8s-application
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: simple-k8s-application
    spec:
      terminationGracePeriodSeconds: 35
      containers:
        - name: simple-k8s-application
          image: simple-k8s-application:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GUNICORN_WORKERS
              value: "2"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 9
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5